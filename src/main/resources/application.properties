spring.config.import=optional:dotenv:

# 1. Configuration de la Base de Données (MySQL exemple)
spring.datasource.url=jdbc:mysql://localhost:3306/repair_management?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuration Hibernate / JPA
# 'update' crée ou modifie les tables automatiquement au démarrage
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# 3. Configuration du Serveur (Optionnel)
server.port=8080
server.servlet.context-path=/

# 4. Configuration JSTL / JSP (Si vous utilisez Spring Boot)
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp


spring.mvc.encoding.charset=UTF-8
spring.mvc.encoding.force=true


# 5. Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=DEBUG
# JWT Configuration
app.jwt.secret=mySecretKeyForJWTGeneration2024SecureAndLongEnoughKey
app.jwt.expiration=86400000

# Server configuration
server.servlet.session.timeout=30m
spring.web.error.whitelabel.enabled=false
# Pour le développement - permet de voir les erreurs JSP
spring.web.error.include-exception=true
spring.web.error.include-binding-errors=always
spring.web.error.include-message=always
spring.web.error.include-stacktrace=always


# Spring Security
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN


# File upload configuration (for profile images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Mailpit Configuration (email de test local)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.test-connection=false

# Désactiver l'authentification et TLS pour Mailpit
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Debug mode pour voir les emails dans la console
spring.mail.properties.mail.debug=true
# Application URL
app.base.url=http://localhost:8080