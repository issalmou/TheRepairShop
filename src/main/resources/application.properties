# DataSource Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/repairshop_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:repairshop}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:repairshop}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Always run schema.sql and data.sql against the configured MySQL database
spring.sql.init.mode=always

# JSP View Resolver Configuration
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.view.order=1

# Server Configuration
server.port=8080
server.servlet.context-path=/

# File uploads
app.upload.dir=./uploads/repairs

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT (use a long random secret in production)
app.jwt.secret=${JWT_SECRET:super-secret-key-that-is-at-least-256-bits-long-and-highly-secure-for-hmac-sha-algorithms}
# app.jwt.expiration-ms=86400000 # 24 hours
 # 5 minutes
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:300000}
app.jwt.cookie-name=ACCESS_TOKEN


