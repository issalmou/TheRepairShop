# DataSource Configuration (In-Memory H2 in MySQL Compatibility Mode)
spring.datasource.url=jdbc:h2:mem:repairshop_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA / Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable spring.sql.init so schema.sql/data.sql are not run, avoiding MySQL syntax errors in H2
spring.sql.init.mode=never

# View resolver configuration for tests
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
spring.mvc.view.order=1

# File Uploads
app.upload.dir=./target/test-uploads
